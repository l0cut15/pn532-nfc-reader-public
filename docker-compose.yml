services:
  nfc-reader:
    image: ghcr.io/l0cut15/pn532-nfc-reader:latest
    container_name: nfc-reader
    restart: unless-stopped

    # Device access - CRITICAL for NFC reader
    # Uncomment the appropriate device mapping for your system:
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"       # Linux USB serial device

    # Linux ACM alternative (e.g. CH340 on some kernels)
    # devices:
    #   - "/dev/ttyACM0:/dev/ttyACM0"     # Linux USB ACM device
    
    # Last resort: privileged mode for broader hardware access
    # privileged: true
    
    # Volume mounts
    volumes:
      - nfc-logs:/var/log/nfc-reader       # Persistent logs
      - /dev:/dev:ro                       # Device access (alternative approach)
      - ./data:/app/data                   # Persists .nfc_reader_registration.json
    
    # Environment variables from .env file
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    
    # Network mode for Home Assistant communication
    network_mode: host  # Simplifies HA communication
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "nfc_reader_service.py", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  nfc-logs:
    driver: local

# data/ directory is bind-mounted (not a named volume) so .nfc_reader_registration.json
# survives container recreation without needing a separate volume entry.